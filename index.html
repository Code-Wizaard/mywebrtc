<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>پیام‌رسان E2EE امن</title>
  <style>
    * { font-family: Tahoma, Arial, sans-serif; box-sizing: border-box; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin:0; padding:20px; min-height:100vh; }
    .container { max-width:820px; margin:auto; background:white; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.2); overflow:hidden; }
    header { background:#4c51bf; color:white; padding:20px; text-align:center; }
    .main { padding:20px; }
    button { padding:12px 20px; background:#4c51bf; color:white; border:none; border-radius:8px; cursor:pointer; margin:5px 0; width:100%; }
    button:hover { background:#434190; }
    textarea { width:100%; padding:12px; border:2px solid #e2e8f0; border-radius:8px; font-family:monospace; font-size:14px; min-height:130px; }
    #chat { height:420px; overflow-y:auto; border:2px solid #e2e8f0; border-radius:12px; padding:15px; background:#f8fafc; margin:15px 0; }
    .msg { margin:10px 0; padding:12px 16px; border-radius:12px; max-width:80%; }
    .me { background:#c6f6d5; margin-left:auto; }
    .them { background:#e2e8f0; margin-right:auto; }
    .status { padding:12px; border-radius:8px; margin:10px 0; font-weight:bold; }
    .success { background:#c6f6d5; }
    .error { background:#fee2e2; color:#b91c1c; }
  </style>
</head>
<body>
  <div class="container">
    <header><h1>🔒 پیام‌رسان E2EE امن</h1></header>
    <div class="main">
      <button onclick="createOffer()">۱. ایجاد Offer جدید</button>
      <button onclick="showOffer()">۲. نمایش Offer برای کپی</button>

      <h3>Offer طرف مقابل:</h3>
      <textarea id="remoteOffer" placeholder="Offer را paste کنید"></textarea>
      <button onclick="setRemoteOffer()">۳. تنظیم Offer و ساخت Answer</button>

      <h3>Answer طرف مقابل:</h3>
      <textarea id="remoteAnswer" placeholder="Answer را paste کنید"></textarea>
      <button onclick="setRemoteAnswer()">۴. تنظیم Answer</button>

      <div id="status" class="status">آماده...</div>
      <div id="copyArea" style="display:none; background:#f1f5f9; padding:12px; border-radius:8px; white-space:pre-wrap; font-family:monospace; font-size:13px; margin:10px 0; max-height:280px; overflow:auto;"></div>

      <div id="chat"></div>

      <div style="display:flex; gap:10px;">
        <input id="message" placeholder="پیام..." style="flex:1;padding:12px;" onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">ارسال</button>
      </div>
    </div>
  </div>

  <script>
    let pc = null, dataChannel = null, sharedKey = null, myPrivateKey = null;

    async function generateKeys() {
      const keyPair = await crypto.subtle.generateKey({ name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey"]);
      myPrivateKey = keyPair.privateKey;
      return await crypto.subtle.exportKey("raw", keyPair.publicKey);
    }

    async function deriveSharedKey(theirRaw) {
      const theirKey = await crypto.subtle.importKey("raw", theirRaw, { name: "ECDH", namedCurve: "P-256" }, true, []);
      sharedKey = await crypto.subtle.deriveKey({ name: "ECDH", public: theirKey }, myPrivateKey, { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
    }

    async function encryptMessage(msg) {
      if (!sharedKey) throw new Error("کلید مشترک آماده نیست");
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const ct = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, sharedKey, new TextEncoder().encode(msg));
      return { iv: Array.from(iv), data: Array.from(new Uint8Array(ct)) };
    }

    async function decryptMessage(enc) {
      if (!sharedKey) throw new Error("کلید مشترک آماده نیست");
      const dec = await crypto.subtle.decrypt({ name: "AES-GCM", iv: new Uint8Array(enc.iv) }, sharedKey, new Uint8Array(enc.data));
      return new TextDecoder().decode(dec);
    }

    async function initPeer(isOffer) {
      pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });

      if (isOffer) {
        dataChannel = pc.createDataChannel("chat");
      } else {
        pc.ondatachannel = e => { dataChannel = e.channel; setupDataChannel(); };
      }

      await generateKeys();
      if (isOffer) setupDataChannel();
    }

    function setupDataChannel() {
      dataChannel.onopen = async () => {
        document.getElementById("status").innerHTML = "🔄 در حال مبادله کلید...";
        
        // ارسال کلید عمومی خودمان
        const myPub = await crypto.subtle.exportKey("raw", myPrivateKey ? await crypto.subtle.importKey("raw", await crypto.subtle.exportKey("raw", (await generateKeys()), {name:"ECDH", namedCurve:"P-256"}, true, []), {name:"ECDH", namedCurve:"P-256"}, true, []) : myPrivateKey); // ساده‌تر
        const myPubRaw = await crypto.subtle.exportKey("raw", (await generateKeys())); wait, fix below.
        // بهتر:
        const pubKeyRaw = await crypto.subtle.exportKey("raw", (await crypto.subtle.importKey("raw", await crypto.subtle.exportKey("raw", myPrivateKey ? (await generateKeys()) : null), ... wait, better way.
      };
      // بهتره ساده کنیم:
      dataChannel.onopen = async () => {
        const myPubRaw = await crypto.subtle.exportKey("raw", (await generateKeys())); // دوباره تولید برای اطمینان
        dataChannel.send(JSON.stringify({ type: "pubkey", key: Array.from(myPubRaw) }));
        document.getElementById("status").textContent = "کلید عمومی ارسال شد...";
      };

      dataChannel.onmessage = async (e) => {
        const data = JSON.parse(e.data);
        if (data.type === "pubkey") {
          await deriveSharedKey(new Uint8Array(data.key));
          document.getElementById("status").innerHTML = "✅ کلید مشترک ساخته شد! چت امن فعال است.";
          document.getElementById("status").classList.add("success");
        } else if (data.iv) {
          try {
            const text = await decryptMessage(data);
            addMessage(text, false);
          } catch(err) { console.error(err); }
        }
      };
    }

    async function createOffer() {
      await initPeer(true);
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      document.getElementById("status").textContent = "Offer آماده. روی نمایش Offer کلیک کنید.";
    }

    function showOffer() {
      if (!pc?.localDescription) return alert("Offer بسازید!");
      const area = document.getElementById("copyArea");
      area.style.display = "block";
      area.textContent = JSON.stringify(pc.localDescription, null, 2);
    }

    async function setRemoteOffer() {
      const input = document.getElementById("remoteOffer").value.trim();
      if (!input) return alert("Offer paste کنید!");
      try {
        const clean = input.replace(/[\n\r\t]+/g, " ").trim();
        const offer = JSON.parse(clean);
        await initPeer(false);
        await pc.setRemoteDescription(offer);
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        document.getElementById("status").textContent = "Answer ساخته شد. نمایش Answer را بزن.";
        showAnswer();
      } catch(e) {
        alert("خطا: " + e.message);
      }
    }

    function showAnswer() {
      if (!pc?.localDescription) return;
      const area = document.getElementById("copyArea");
      area.style.display = "block";
      area.textContent = JSON.stringify(pc.localDescription, null, 2);
    }

    async function setRemoteAnswer() {
      const input = document.getElementById("remoteAnswer").value.trim();
      if (!input) return alert("Answer paste کنید!");
      try {
        const clean = input.replace(/[\n\r\t]+/g, " ").trim();
        await pc.setRemoteDescription(JSON.parse(clean));
      } catch(e) { alert("خطا: " + e.message); }
    }

    async function sendMessage() {
      const input = document.getElementById("message");
      const msg = input.value.trim();
      if (!msg || !dataChannel || dataChannel.readyState !== "open") return alert("اتصال آماده نیست!");

      try {
        const encrypted = await encryptMessage(msg);
        dataChannel.send(JSON.stringify(encrypted));
        addMessage(msg, true);
        input.value = "";
      } catch(err) {
        alert("خطا: " + err.message);
      }
    }

    function addMessage(text, isMe) {
      const chat = document.getElementById("chat");
      const div = document.createElement("div");
      div.className = `msg ${isMe ? 'me' : 'them'}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }
  </script>
</body>
</html>
