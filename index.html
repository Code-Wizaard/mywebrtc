<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>پیام‌رسان E2EE امن</title>
  <style>
    * {
      font-family: Tahoma, Arial, sans-serif;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    header {
      background: #4c51bf;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .main {
      padding: 20px;
    }

    button {
      padding: 12px 20px;
      background: #4c51bf;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 5px 0;
      width: 100%;
    }

    button:hover {
      background: #434190;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-family: monospace;
      font-size: 14px;
      min-height: 130px;
    }

    #chat {
      height: 420px;
      overflow-y: auto;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 15px;
      background: #f8fafc;
      margin: 15px 0;
    }

    .msg {
      margin: 10px 0;
      padding: 12px 16px;
      border-radius: 12px;
      max-width: 80%;
      word-wrap: break-word;
    }

    .me {
      background: #c6f6d5;
      margin-left: auto;
    }

    .them {
      background: #e2e8f0;
      margin-right: auto;
    }

    .status {
      padding: 12px;
      border-radius: 8px;
      margin: 10px 0;
      font-weight: bold;
      background: #e2e8f0;
    }

    .success {
      background: #c6f6d5;
      color: #065f46;
    }

    .error {
      background: #fee2e2;
      color: #b91c1c;
    }

    .info {
      background: #dbeafe;
      color: #1e40af;
    }

    .warning {
      background: #fef3c7;
      color: #92400e;
    }

    .step-indicator {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
      padding: 10px;
      background: #f8fafc;
      border-radius: 8px;
    }

    .step {
      flex: 1;
      text-align: center;
      padding: 5px;
    }

    .step.active {
      color: #4c51bf;
      font-weight: bold;
    }

    .step.done {
      color: #065f46;
    }

    #copyArea {
      background: #f1f5f9;
      padding: 12px;
      border-radius: 8px;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 13px;
      margin: 10px 0;
      max-height: 280px;
      overflow: auto;
      border: 2px solid #e2e8f0;
      display: none;
    }

    .copy-btn {
      background: #10b981 !important;
      margin-top: 5px !important;
    }

    .copy-btn:hover {
      background: #059669 !important;
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>🔒 پیام‌رسان E2EE امن</h1>
    </header>
    <div class="main">
      <div class="step-indicator">
        <div class="step" id="step1">۱. Offer</div>
        <div class="step" id="step2">۲. Answer</div>
        <div class="step" id="step3">۳. کلید</div>
        <div class="step" id="step4">۴. پیام</div>
      </div>

      <button onclick="createOffer()">۱. ایجاد Offer جدید</button>
      <button onclick="showOffer()">۲. نمایش Offer برای کپی</button>

      <h3>Offer طرف مقابل:</h3>
      <textarea id="remoteOffer" placeholder="Offer کامل را paste کنید"></textarea>
      <button onclick="setRemoteOffer()">۳. تنظیم Offer و ساخت Answer</button>

      <h3>Answer طرف مقابل:</h3>
      <textarea id="remoteAnswer" placeholder="Answer را paste کنید"></textarea>
      <button onclick="setRemoteAnswer()">۴. تنظیم Answer</button>

      <div id="status" class="status">آماده اتصال...</div>

      <div id="copyArea"></div>
      <button id="copyBtn" class="copy-btn" style="display:none;" onclick="copyToClipboard()">📋 کپی متن</button>

      <div id="chat"></div>

      <div style="display:flex; gap:10px;">
        <input id="message" placeholder="پیام خود را بنویسید..." style="flex:1; padding:12px;"
          onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()" id="sendBtn">ارسال</button>
      </div>
    </div>
  </div>

  <script>
    let pc = null;
    let dataChannel = null;
    let sharedKey = null;
    let myPrivateKey = null;
    let myPublicKeyRaw = null;
    let isInitiator = false;
    let keyExchangeComplete = false;
    let currentCopyText = '';

    // Helper functions for base64 encoding/decoding
    function arrayBufferToBase64(buffer) {
      const bytes = new Uint8Array(buffer);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary);
    }

    function base64ToArrayBuffer(base64) {
      try {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
          bytes[i] = binary.charCodeAt(i);
        }
        return bytes.buffer;
      } catch (error) {
        console.error("Error decoding base64:", error);
        throw new Error("Invalid base64 string");
      }
    }

    async function generateMyKeys() {
      try {
        const keyPair = await crypto.subtle.generateKey(
          { name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey"]
        );
        myPrivateKey = keyPair.privateKey;
        const publicKeyBuffer = await crypto.subtle.exportKey("raw", keyPair.publicKey);
        myPublicKeyRaw = new Uint8Array(publicKeyBuffer);
        console.log("Keys generated successfully. Public key length:", myPublicKeyRaw.length);
        return myPublicKeyRaw;
      } catch (error) {
        console.error("Error generating keys:", error);
        throw error;
      }
    }

    async function deriveSharedKey(theirPublicKeyData) {
      try {
        // Ensure we have a proper Uint8Array
        let theirPublicKeyRaw;
        if (theirPublicKeyData instanceof Uint8Array) {
          theirPublicKeyRaw = theirPublicKeyData;
        } else if (Array.isArray(theirPublicKeyData)) {
          theirPublicKeyRaw = new Uint8Array(theirPublicKeyData);
        } else if (typeof theirPublicKeyData === 'string') {
          // If it's a base64 string
          const buffer = base64ToArrayBuffer(theirPublicKeyData);
          theirPublicKeyRaw = new Uint8Array(buffer);
        } else {
          throw new Error("Invalid public key format");
        }

        // Validate key length (P-256 public keys are 65 bytes)
        if (theirPublicKeyRaw.length !== 65) {
          throw new Error(`Invalid public key length: ${theirPublicKeyRaw.length}. Expected 65 bytes.`);
        }

        console.log("Importing public key of length:", theirPublicKeyRaw.length);

        const theirPublicKey = await crypto.subtle.importKey(
          "raw",
          theirPublicKeyRaw,
          { name: "ECDH", namedCurve: "P-256" },
          true,
          []
        );

        sharedKey = await crypto.subtle.deriveKey(
          { name: "ECDH", public: theirPublicKey },
          myPrivateKey,
          { name: "AES-GCM", length: 256 },
          true,
          ["encrypt", "decrypt"]
        );

        keyExchangeComplete = true;
        updateStatus("✅ کلید مشترک ساخته شد! حالا می‌توانید پیام امن بفرستید.", "success");
        updateStep(4);
        return true;
      } catch (error) {
        console.error("Error deriving shared key:", error);
        throw error;
      }
    }

    async function encryptMessage(message) {
      if (!sharedKey) throw new Error("کلید مشترک هنوز ساخته نشده");
      try {
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const encoded = new TextEncoder().encode(message);
        const ciphertext = await crypto.subtle.encrypt(
          { name: "AES-GCM", iv: iv },
          sharedKey,
          encoded
        );
        return {
          iv: Array.from(iv),
          data: Array.from(new Uint8Array(ciphertext))
        };
      } catch (error) {
        console.error("Error encrypting message:", error);
        throw error;
      }
    }

    async function decryptMessage(enc) {
      if (!sharedKey) throw new Error("کلید مشترک آماده نیست");
      try {
        const iv = new Uint8Array(enc.iv);
        const data = new Uint8Array(enc.data);

        const decrypted = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: iv },
          sharedKey,
          data
        );
        return new TextDecoder().decode(decrypted);
      } catch (error) {
        console.error("Error decrypting message:", error);
        throw error;
      }
    }

    async function sendPublicKey() {
      if (!dataChannel || dataChannel.readyState !== "open") {
        console.error("Data channel not ready");
        return false;
      }
      try {
        if (!myPublicKeyRaw) {
          await generateMyKeys();
        }

        // Send as base64 to avoid any data corruption
        const base64Key = arrayBufferToBase64(myPublicKeyRaw);
        const message = JSON.stringify({
          type: "pubkey",
          key: base64Key
        });

        dataChannel.send(message);
        console.log("Public key sent successfully");
        updateStatus("🔑 کلید عمومی ارسال شد", "info");
        return true;
      } catch (error) {
        console.error("Error sending public key:", error);
        updateStatus("❌ خطا در ارسال کلید: " + error.message, "error");
        return false;
      }
    }

    function setupDataChannel() {
      if (!dataChannel) return;

      dataChannel.onopen = async () => {
        console.log("Data channel opened");
        updateStatus("📡 کانال داده باز شد، در حال ارسال کلید عمومی...", "info");
        updateStep(3);
        await sendPublicKey();
      };

      dataChannel.onmessage = async (e) => {
        try {
          console.log("Received message from data channel");
          const data = JSON.parse(e.data);

          if (data.type === "pubkey") {
            console.log("Received public key from peer");

            // If we haven't sent our key yet, send it now
            if (!myPublicKeyRaw) {
              await generateMyKeys();
            }

            // Derive shared key from their public key
            await deriveSharedKey(data.key);

            // Send our public key if we haven't already
            if (!keyExchangeComplete) {
              await sendPublicKey();
            }

          } else if (data.iv && data.data) {
            // Received encrypted message
            console.log("Received encrypted message");
            const text = await decryptMessage(data);
            addMessage(text, false);
          } else {
            console.log("Unknown message type:", data);
          }
        } catch (err) {
          console.error("Error processing message:", err);
          updateStatus("❌ خطا در پردازش پیام: " + err.message, "error");
        }
      };

      dataChannel.onerror = (error) => {
        console.error("Data channel error:", error);
        updateStatus("❌ خطا در کانال داده", "error");
      };

      dataChannel.onclose = () => {
        console.log("Data channel closed");
        updateStatus("🔴 کانال داده بسته شد", "error");
      };
    }

    function updateStatus(message, type = "info") {
      const status = document.getElementById("status");
      status.textContent = message;
      status.className = `status ${type}`;
    }

    function updateStep(step) {
      for (let i = 1; i <= 4; i++) {
        const element = document.getElementById(`step${i}`);
        if (element) {
          element.className = 'step';
          if (i < step) element.classList.add('done');
          if (i === step) element.classList.add('active');
        }
      }
    }

    function displayCopyText(text) {
      const area = document.getElementById("copyArea");
      const btn = document.getElementById("copyBtn");
      currentCopyText = text;
      area.textContent = text;
      area.style.display = "block";
      btn.style.display = "block";
    }

    function copyToClipboard() {
      if (!currentCopyText) {
        alert("متن برای کپی وجود ندارد!");
        return;
      }

      // Use the modern clipboard API
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(currentCopyText)
          .then(() => {
            updateStatus("✅ متن با موفقیت کپی شد!", "success");
          })
          .catch(err => {
            console.error("Clipboard write failed:", err);
            // Fallback
            fallbackCopy(currentCopyText);
          });
      } else {
        // Fallback for older browsers
        fallbackCopy(currentCopyText);
      }
    }

    function fallbackCopy(text) {
      try {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.left = '-9999px';
        textarea.style.top = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        updateStatus("✅ متن با موفقیت کپی شد!", "success");
      } catch (err) {
        console.error("Fallback copy failed:", err);
        updateStatus("❌ خطا در کپی: " + err.message, "error");
      }
    }

    async function createOffer() {
      try {
        updateStatus("🔄 در حال ساخت Offer...", "info");
        updateStep(1);

        pc = new RTCPeerConnection({
          iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        });

        dataChannel = pc.createDataChannel("chat");
        isInitiator = true;
        setupDataChannel();

        // Generate keys immediately
        await generateMyKeys();
        console.log("Keys generated for offer");

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        updateStatus("✅ Offer آماده شد. روی دکمه ۲ کلیک کنید.", "success");
        updateStep(2);
      } catch (error) {
        console.error("Error creating offer:", error);
        updateStatus("❌ خطا در ساخت Offer: " + error.message, "error");
      }
    }

    function showOffer() {
      if (!pc?.localDescription) {
        alert("ابتدا Offer بسازید!");
        return;
      }
      const text = JSON.stringify(pc.localDescription, null, 2);
      displayCopyText(text);
      updateStatus("📋 Offer برای کپی آماده است", "info");
    }

    async function setRemoteOffer() {
      const input = document.getElementById("remoteOffer").value.trim();
      if (!input) {
        alert("Offer را paste کنید!");
        return;
      }

      try {
        updateStatus("🔄 در حال پردازش Offer...", "info");

        const clean = input.replace(/[\n\r\t]+/g, " ").trim();
        const offer = JSON.parse(clean);

        pc = new RTCPeerConnection({
          iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        });
        isInitiator = false;

        pc.ondatachannel = (e) => {
          console.log("Data channel received from peer");
          dataChannel = e.channel;
          setupDataChannel();
        };

        // Generate keys
        await generateMyKeys();
        await pc.setRemoteDescription(offer);

        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);

        updateStatus("✅ Answer ساخته شد. روی نمایش Answer کلیک کنید.", "success");
        updateStep(2);
        showAnswer();
      } catch (e) {
        console.error("Error setting remote offer:", e);
        updateStatus("❌ خطا: " + e.message, "error");
        alert("خطا: " + e.message);
      }
    }

    function showAnswer() {
      if (!pc?.localDescription) {
        alert("ابتدا Answer بسازید!");
        return;
      }
      const text = JSON.stringify(pc.localDescription, null, 2);
      displayCopyText(text);
      updateStatus("📋 Answer برای کپی آماده است", "info");
    }

    async function setRemoteAnswer() {
      const input = document.getElementById("remoteAnswer").value.trim();
      if (!input) {
        alert("Answer را paste کنید!");
        return;
      }

      try {
        updateStatus("🔄 در حال تنظیم Answer...", "info");

        const clean = input.replace(/[\n\r\t]+/g, " ").trim();
        await pc.setRemoteDescription(JSON.parse(clean));

        updateStatus("✅ Answer تنظیم شد. منتظر دریافت کلید عمومی...", "info");
        updateStep(3);
      } catch (e) {
        console.error("Error setting remote answer:", e);
        updateStatus("❌ خطا: " + e.message, "error");
        alert("خطا: " + e.message);
      }
    }

    async function sendMessage() {
      const input = document.getElementById("message");
      const msg = input.value.trim();

      if (!msg) return;

      if (!dataChannel || dataChannel.readyState !== "open") {
        alert("اتصال هنوز آماده ارسال پیام نیست!");
        return;
      }

      if (!sharedKey) {
        alert("کلید مشترک هنوز ساخته نشده! منتظر دریافت کلید عمومی طرف مقابل باشید.");
        return;
      }

      try {
        const encrypted = await encryptMessage(msg);
        dataChannel.send(JSON.stringify(encrypted));
        addMessage(msg, true);
        input.value = "";
      } catch (err) {
        console.error("Error sending message:", err);
        alert("خطا در ارسال: " + err.message);
      }
    }

    function addMessage(text, isMe) {
      const chat = document.getElementById("chat");
      const div = document.createElement("div");
      div.className = `msg ${isMe ? 'me' : 'them'}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    // Initialize
    console.log("E2EE Messenger initialized");
    updateStep(1);
  </script>
</body>

</html>
